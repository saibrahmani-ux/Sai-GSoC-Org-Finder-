name: Update Mentor Leaderboard
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: update-mentor-leaderboard
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node .github/scripts/generate-mentor-leaderboard.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/reviewers/mentor-leaderboard.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: update mentor leaderboard"
          git push
